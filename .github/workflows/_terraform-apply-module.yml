name: (reusable) Terraform Apply - single module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TFSTATE_RESOURCE_GROUP:
        required: true
      TFSTATE_STORAGE_ACCOUNT:
        required: true
      YOUTUBE_API_KEY:
        required: false
      ALERT_EMAIL:
        required: false
      DATABRICKS_METASTORE_ID:
        required: false
      FUNCTION_KEY_INGESTION:
        required: false
      FUNCTION_KEY_JSON_TO_PARQUET:
        required: false
      FUNCTION_KEY_DATA_QUALITY:
        required: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: azure/terraform/envs/dev/${{ inputs.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate"

      # GitHub Actions does not allow referencing the secrets context inside
      # a with: block on a reusable-workflow-call job, so the
      # module-specific -var flags are built here instead, inside a normal
      # run: step, where the secrets context is valid.
      - name: Build module-specific -var args
        id: vars
        run: |
          ARGS=""
          if [ "${{ inputs.module }}" != "storage" ]; then
            ARGS="-var=tfstate_resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }} -var=tfstate_storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          fi
          case "${{ inputs.module }}" in
            security)   ARGS="$ARGS -var=youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" ;;
            monitoring) ARGS="$ARGS -var=alert_email=${{ secrets.ALERT_EMAIL }}" ;;
            databricks) ARGS="$ARGS -var=metastore_id=${{ secrets.DATABRICKS_METASTORE_ID }}" ;;
            data-factory) ARGS="$ARGS -var='function_keys={\"youtube-api-ingestion\"=\"${{ secrets.FUNCTION_KEY_INGESTION }}\",\"json-to-parquet\"=\"${{ secrets.FUNCTION_KEY_JSON_TO_PARQUET }}\",\"data-quality\"=\"${{ secrets.FUNCTION_KEY_DATA_QUALITY }}\"}'" ;;
          esac
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      # This is where "small change != full rebuild" is actually enforced:
      # this job only ever targets its own module directory / state file,
      # so `terraform apply` here can never touch resources belonging to
      # another module.
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false ${{ steps.vars.outputs.args }}
