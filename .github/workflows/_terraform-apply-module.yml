name: (reusable) Terraform Apply — single module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      extra_var_args:
        required: false
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TFSTATE_RESOURCE_GROUP:
        required: true
      TFSTATE_STORAGE_ACCOUNT:
        required: true

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: azure/terraform/envs/dev/${{ inputs.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate"

      # This is where "small change != full rebuild" is actually enforced:
      # this job only ever targets its own module directory / state file,
      # so `terraform apply` here can never touch resources belonging to
      # another module.
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false ${{ inputs.extra_var_args }}
