name: Deploy Azure Functions Code

# This is the workflow that handles the most common "chota change": editing
# one Function's Python code. It never runs `terraform apply` — Terraform
# only owns the Function App *shape* (terraform-apply.yml, `functions`
# module); this workflow just pushes new code into an already-existing App,
# so nothing else in the infrastructure is touched or re-created.
on:
  push:
    branches: [main]
    paths:
      - "azure/functions/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            youtube-api-ingestion:
              - 'azure/functions/youtube_api_ingestion/**'
            json-to-parquet:
              - 'azure/functions/json_to_parquet/**'
            data-quality:
              - 'azure/functions/data_quality/**'

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Map matrix app to source dir + Function App name
        id: map
        run: |
          case "${{ matrix.app }}" in
            youtube-api-ingestion) DIR="youtube_api_ingestion" ;;
            json-to-parquet)       DIR="json_to_parquet" ;;
            data-quality)          DIR="data_quality" ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "app_name=func-ytpipeline-${{ matrix.app }}-dev" >> "$GITHUB_OUTPUT"

      - name: Install dependencies into a deployment package
        working-directory: azure/functions/${{ steps.map.outputs.dir }}
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -r ../${{ matrix.app }}.zip . -x "*.git*"

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.map.outputs.app_name }}
          package: azure/functions/${{ matrix.app }}.zip
