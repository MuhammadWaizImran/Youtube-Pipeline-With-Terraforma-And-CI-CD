name: (reusable) AWS Terraform Apply - single module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      TFSTATE_BUCKET:
        required: true
      TFSTATE_DYNAMODB_TABLE:
        required: true
      YOUTUBE_API_KEY:
        required: false
      ALERT_EMAIL:
        required: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: aws/terraform/envs/dev/${{ inputs.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }}" \
            -backend-config="region=us-east-1"

      # GitHub Actions does not allow referencing the secrets context inside
      # a with: block on a reusable-workflow-call job (the caller can't pass
      # "-var=...${{ secrets.X }}" through an input string), so the
      # module-specific -var flags are built here instead, inside a normal
      # run: step, where the secrets context is valid.
      - name: Build module-specific -var args
        id: vars
        run: |
          ARGS=""
          if [ "${{ inputs.module }}" != "storage" ]; then
            ARGS="-var=tfstate_bucket=${{ secrets.TFSTATE_BUCKET }} -var=tfstate_dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }}"
          fi
          case "${{ inputs.module }}" in
            monitoring) ARGS="$ARGS -var=alert_email=${{ secrets.ALERT_EMAIL }}" ;;
            lambda)     ARGS="$ARGS -var=youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" ;;
          esac
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      # Same isolation principle as the Azure setup: this job only ever
      # targets its own module directory / state file, so a change here
      # can never touch another module's resources.
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false ${{ steps.vars.outputs.args }}
