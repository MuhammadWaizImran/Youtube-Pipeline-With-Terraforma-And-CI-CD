name: Terraform Apply

# Runs on merge to main. Applies ONLY the module(s) whose files changed —
# each module is its own job, its own Terraform state file, and (via the
# `dev` GitHub environment) can carry its own required-reviewer approval
# gate. Jobs are chained in dependency order (storage -> security/monitoring
# -> databricks -> functions -> data-factory) via `needs`, but a job that
# has nothing to apply is skipped instantly (`if:` check), not run as a
# no-op — so an unrelated module is never even touched.
on:
  push:
    branches: [main]
    paths:
      - "azure/terraform/**"
      - "azure/data_factory/**"

permissions:
  id-token: write
  contents: read

env:
  TFSTATE_CONTAINER: tfstate

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            storage:
              - 'azure/terraform/envs/dev/storage/**'
            security:
              - 'azure/terraform/envs/dev/security/**'
            monitoring:
              - 'azure/terraform/envs/dev/monitoring/**'
            databricks:
              - 'azure/terraform/envs/dev/databricks/**'
            functions:
              - 'azure/terraform/envs/dev/functions/**'
            data-factory:
              - 'azure/terraform/envs/dev/data-factory/**'
              - 'azure/data_factory/**'

  storage:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.modules, 'storage')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: storage
    secrets: inherit

  security:
    needs: [detect-changes, storage]
    if: always() && !failure() && !cancelled() && contains(needs.detect-changes.outputs.modules, 'security')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: security
    secrets: inherit

  monitoring:
    needs: [detect-changes, storage]
    if: always() && !failure() && !cancelled() && contains(needs.detect-changes.outputs.modules, 'monitoring')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: monitoring
    secrets: inherit

  databricks:
    needs: [detect-changes, storage]
    if: always() && !failure() && !cancelled() && contains(needs.detect-changes.outputs.modules, 'databricks')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: databricks
    secrets: inherit

  functions:
    needs: [detect-changes, storage, security, monitoring, databricks]
    if: always() && !failure() && !cancelled() && contains(needs.detect-changes.outputs.modules, 'functions')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: functions
    secrets: inherit

  data-factory:
    needs: [detect-changes, storage, security, monitoring, databricks, functions]
    if: always() && !failure() && !cancelled() && contains(needs.detect-changes.outputs.modules, 'data-factory')
    uses: ./.github/workflows/_terraform-apply-module.yml
    with:
      module: data-factory
    secrets: inherit
