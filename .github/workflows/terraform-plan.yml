name: Terraform Plan

# Runs on every PR. Detects which module directories actually changed and
# only plans those — untouched modules are skipped entirely (not just
# no-op'd), which is what keeps a one-module change from ever touching the
# others' state or resources.
on:
  pull_request:
    paths:
      - "azure/terraform/**"
      - "azure/data_factory/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  TFSTATE_RESOURCE_GROUP: ${{ secrets.TFSTATE_RESOURCE_GROUP }}
  TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
  TFSTATE_CONTAINER: tfstate

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            storage:
              - 'azure/terraform/envs/dev/storage/**'
            security:
              - 'azure/terraform/envs/dev/security/**'
            monitoring:
              - 'azure/terraform/envs/dev/monitoring/**'
            databricks:
              - 'azure/terraform/envs/dev/databricks/**'
            functions:
              - 'azure/terraform/envs/dev/functions/**'
            data-factory:
              - 'azure/terraform/envs/dev/data-factory/**'
              - 'azure/data_factory/**'

  plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.modules) }}
    defaults:
      run:
        working-directory: azure/terraform/envs/dev/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (module-scoped state)
        run: |
          terraform init \
            -backend-config="resource_group_name=$TFSTATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TFSTATE_CONTAINER"

      - name: Build module-specific -var args
        id: vars
        run: |
          ARGS=""
          # `storage` is the base module and declares no tfstate_* vars —
          # every other module reads storage's outputs via remote state and
          # needs to know where to find it.
          if [ "${{ matrix.module }}" != "storage" ]; then
            ARGS="-var=tfstate_resource_group_name=$TFSTATE_RESOURCE_GROUP -var=tfstate_storage_account_name=$TFSTATE_STORAGE_ACCOUNT -var=tfstate_container_name=$TFSTATE_CONTAINER"
          fi
          case "${{ matrix.module }}" in
            security)   ARGS="$ARGS -var=youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" ;;
            monitoring) ARGS="$ARGS -var=alert_email=${{ secrets.ALERT_EMAIL }}" ;;
            databricks) ARGS="$ARGS -var=metastore_id=${{ secrets.DATABRICKS_METASTORE_ID }}" ;;
            data-factory) ARGS="$ARGS -var='function_keys={\"youtube-api-ingestion\"=\"${{ secrets.FUNCTION_KEY_INGESTION }}\",\"json-to-parquet\"=\"${{ secrets.FUNCTION_KEY_JSON_TO_PARQUET }}\",\"data-quality\"=\"${{ secrets.FUNCTION_KEY_DATA_QUALITY }}\"}'" ;;
          esac
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false ${{ steps.vars.outputs.args }} \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('azure/terraform/envs/dev/${{ matrix.module }}/plan_output.txt', 'utf8').slice(-60000);
            const body = `#### Terraform Plan — \`${{ matrix.module }}\`\n<details><summary>Show plan</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
