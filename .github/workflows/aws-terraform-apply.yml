name: AWS Terraform Apply

# Runs on merge to main. Applies ONLY the module(s) whose files changed.
# Dependency order: storage -> security/monitoring -> glue -> lambda ->
# orchestration. A job with nothing to apply is skipped via `if:`, not
# run as a no-op, so (for example) changing only the EventBridge schedule
# expression in `orchestration` never touches storage/security/glue/lambda.
on:
  push:
    branches: [main]
    paths:
      - "aws/terraform/**"
      - "aws/step_functions/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            storage:
              - 'aws/terraform/envs/dev/storage/**'
            security:
              - 'aws/terraform/envs/dev/security/**'
            monitoring:
              - 'aws/terraform/envs/dev/monitoring/**'
            glue:
              - 'aws/terraform/envs/dev/glue/**'
            lambda:
              - 'aws/terraform/envs/dev/lambda/**'
            orchestration:
              - 'aws/terraform/envs/dev/orchestration/**'
              - 'aws/step_functions/**'

  storage:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.modules, 'storage')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: storage
    secrets: inherit

  security:
    needs: [detect-changes, storage]
    if: |
      always() && !failure() && !cancelled() &&
      contains(needs.detect-changes.outputs.modules, 'security')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: security
      extra_var_args: "-var=tfstate_bucket=${{ secrets.TFSTATE_BUCKET }} -var=tfstate_dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }}"
    secrets: inherit

  monitoring:
    needs: [detect-changes, storage]
    if: |
      always() && !failure() && !cancelled() &&
      contains(needs.detect-changes.outputs.modules, 'monitoring')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: monitoring
      extra_var_args: "-var=alert_email=${{ secrets.ALERT_EMAIL }}"
    secrets: inherit

  glue:
    needs: [detect-changes, storage, security]
    if: |
      always() && !failure() && !cancelled() &&
      contains(needs.detect-changes.outputs.modules, 'glue')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: glue
      extra_var_args: "-var=tfstate_bucket=${{ secrets.TFSTATE_BUCKET }} -var=tfstate_dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }}"
    secrets: inherit

  lambda:
    needs: [detect-changes, storage, security, monitoring, glue]
    if: |
      always() && !failure() && !cancelled() &&
      contains(needs.detect-changes.outputs.modules, 'lambda')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: lambda
      extra_var_args: "-var=tfstate_bucket=${{ secrets.TFSTATE_BUCKET }} -var=tfstate_dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }} -var=youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}"
    secrets: inherit

  orchestration:
    needs: [detect-changes, storage, security, monitoring, glue, lambda]
    if: |
      always() && !failure() && !cancelled() &&
      contains(needs.detect-changes.outputs.modules, 'orchestration')
    uses: ./.github/workflows/_aws-terraform-apply-module.yml
    with:
      module: orchestration
      extra_var_args: "-var=tfstate_bucket=${{ secrets.TFSTATE_BUCKET }} -var=tfstate_dynamodb_table=${{ secrets.TFSTATE_DYNAMODB_TABLE }}"
    secrets: inherit
